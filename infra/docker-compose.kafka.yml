services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=techie-service-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=redpanda:9092